<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Terra Alert</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="logo-container">
              <img src="{{ url_for('static', filename='images/alert-icon.svg') }}" 
     alt="Alert Icon" 
     class="logo-icon">
                <div class="brand-block">
                    <div class="brand">Terra Alert</div>
                    <div class="tagline">Early Disaster Warning System</div>
                </div>
            </div>
            <nav class="nav">
                <a href="{{ url_for('index') }}">Home</a>
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('guidance') }}">Guidance</a>
                <a href="{{ url_for('alerts') }}">Alerts</a>
                <a href="{{ url_for('help_page') }}">Help</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container footer-content">
            <p>⚠️ For awareness purposes only. Not a replacement for official disaster management authorities.</p>
            <p>Terra Alert - Early Disaster Risk Estimation System</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/location.js') }}"></script>
</body>
</html>
